events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    limit_req_zone $binary_remote_addr zone=chat_limit:10m rate=10r/m;
    limit_req_zone $binary_remote_addr zone=api_limit:10m  rate=30r/m;

    server {
        listen 80;
        server_name localhost;

        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/ {
            limit_req zone=api_limit burst=10 nodelay;
            proxy_pass http://agent:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /health {
            proxy_pass http://agent:8000/health;
        }
        location /audit {
            proxy_pass http://agent:8000/audit;
        }
        location /memories {
            proxy_pass http://agent:8000/memories;
        }
        location /chat {
            limit_req zone=chat_limit burst=5 nodelay;
            proxy_pass http://agent:8000/chat;
        }
    }
}
