events {
    worker_connections 1024;
}
http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;
    server {
        listen 80;
        server_name localhost;
        location / {
            root /usr/share/nginx/html;
            index index.html;
        }
        location /api/ {
            proxy_pass http://agent:8000/;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
        }
        location /health {
            proxy_pass http://agent:8000/health;
        }
        location /audit {
            proxy_pass http://agent:8000/audit;
        }
        location /memories {
            proxy_pass http://agent:8000/memories;
        }
        location /chat {
            proxy_pass http://agent:8000/chat;
        }
    }
}