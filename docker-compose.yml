services:

  nginx:
    image: nginx:alpine
    container_name: aegis_nginx
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./nginx/html:/usr/share/nginx/html
    depends_on:
      - agent
    networks:
      - aegis_net

  agent:
    build: ./agent
    container_name: aegis_agent
    restart: unless-stopped
    environment:
      - SECRET_BACKEND=env
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ANTHROPIC_MODEL=claude-sonnet-4-5
      - AGENT_TIMEZONE=America/New_York
      - MEMORY_MASTER_KEY=${MEMORY_MASTER_KEY}
      - VAULT_TOKEN=${VAULT_TOKEN}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - OPA_URL=http://opa:8181
    volumes:
      - ./agent/skills:/app/skills
      - ./agent/core:/app/core
      - ./agent/data:/app/data
      - ./agent/config.yaml:/app/config.yaml
    ports:
      - "8000:8000"
    networks:
      - aegis_net

  vault:
    image: hashicorp/vault:1.15
    container_name: aegis_vault
    restart: unless-stopped
    cap_add:
      - IPC_LOCK
    environment:
      - VAULT_DEV_ROOT_TOKEN_ID=${VAULT_TOKEN}
      - VAULT_DEV_LISTEN_ADDRESS=0.0.0.0:8200
    healthcheck:
      test: ["CMD", "sh", "-c", "VAULT_ADDR=http://127.0.0.1:8200 vault status"]
      interval: 5s
      timeout: 5s
      retries: 15
      start_period: 10s
    ports:
      - "8200:8200"
    networks:
      - aegis_net

  opa:
    image: openpolicyagent/opa:latest
    container_name: aegis_opa
    restart: unless-stopped
    command: run --server --addr :8181 /policies
    volumes:
      - ./opa:/policies
    ports:
      - "8181:8181"
    networks:
      - aegis_net

  redis:
    image: redis:7-alpine
    container_name: aegis_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - aegis_net

networks:
  aegis_net:
    driver: bridge